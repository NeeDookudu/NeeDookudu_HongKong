name: Broadway HK Data Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added cryptography here to fix your error
          pip install requests cryptography 

      - name: Run encoded scraper
        env:
          # This maps your GitHub Secret to an Environment Variable
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: python HK_Whole_Run.py

      - name: Commit and push JSON data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Broadway HK Movie Data"
          file_pattern: "data/*.json"
